name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DEVELOPER_DIR: ${{ vars.DEVELOPER_DIR || '/Applications/Xcode_15.3.app/Contents/Developer' }}
  XCODE_VERSION: ${{ vars.XCODE_VERSION || '15.3' }}
  SWIFT_VERSION: ${{ vars.SWIFT_VERSION || '5.9' }}
  TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT || '300' }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ vars.MACOS_RUNNER || 'macos-14' }}
    timeout-minutes: ${{ fromJSON(vars.TEST_TIMEOUT || '30') }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
        swift --version
        echo "Target Swift version: ${{ env.SWIFT_VERSION }}"
        echo "Test timeout: ${{ env.TEST_TIMEOUT }} seconds"
        
    - name: Setup API Configuration for Testing
      if: vars.DANDANPLAY_APP_ID != '' && vars.DANDANPLAY_APP_SECRET != ''
      run: |
        # 创建临时的 API 配置文件用于测试
        cat > Sources/Utilities/DanDanPlayConfig.swift << 'EOF'
        import Foundation
        
        /// DanDanPlay API配置管理
        /// 
        /// 安全提醒：
        /// 1. AppSecret不应在客户端应用中硬编码
        /// 2. 发布时应对代码进行混淆以防止AppSecret泄露
        /// 3. 使用签名验证模式而非凭证模式
        /// 
        /// 申请地址：https://doc.dandanplay.com/open/#_3-%E7%94%B3%E8%AF%B7-appid-%E5%92%8C-appsecret
        struct DanDanPlayConfig {
            /// API AppId - 从环境变量读取
            static let appId: String = "${DANDANPLAY_APP_ID}"
            
            /// API AppSecret - 从环境变量读取
            private static let appSecret: String = "${DANDANPLAY_APP_SECRET}"
            
            /// 获取AppSecret（内部使用）
            static var secretKey: String {
                return appSecret
            }
            
            /// 检查是否已配置API密钥
            static var isConfigured: Bool {
                return appId != "YOUR_APP_ID" && 
                       appSecret != "YOUR_APP_SECRET" && 
                       !appId.isEmpty && 
                       !appSecret.isEmpty
            }
            
            /// 验证配置有效性
            static func validateConfiguration() -> (isValid: Bool, errorMessage: String?) {
                if appId.isEmpty || appId == "YOUR_APP_ID" {
                    return (false, "AppId未配置，请联系开发者获取")
                }
                
                if appSecret.isEmpty || appSecret == "YOUR_APP_SECRET" {
                    return (false, "AppSecret未配置，请联系开发者")
                }
                
                return (true, nil)
            }
        }
        EOF
        # 使用 sed 替换环境变量
        sed -i '' "s/\${DANDANPLAY_APP_ID}/${{ vars.DANDANPLAY_APP_ID }}/g" Sources/Utilities/DanDanPlayConfig.swift
        sed -i '' "s/\${DANDANPLAY_APP_SECRET}/${{ vars.DANDANPLAY_APP_SECRET }}/g" Sources/Utilities/DanDanPlayConfig.swift
        echo "✅ API 配置已设置用于测试 (AppID: ${{ vars.DANDANPLAY_APP_ID }})"
      
    - name: Setup Mock API Configuration
      if: vars.DANDANPLAY_APP_ID == '' || vars.DANDANPLAY_APP_SECRET == ''
      run: |
        echo "⚠️ 未配置 Repository variables，使用模拟配置"
        echo "请在 GitHub Repository Settings > Variables 中配置："
        echo "- DANDANPLAY_APP_ID"
        echo "- DANDANPLAY_APP_SECRET"
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          .build
          ~/Library/Caches/org.swift.swiftpm/
        key: ${{ runner.os }}-test-${{ hashFiles('Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-test-
    
    - name: Run unit tests with API integration
      if: vars.DANDANPLAY_APP_ID != '' && vars.DANDANPLAY_APP_SECRET != ''
      run: |
        echo "🧪 运行完整测试套件（包含 API 集成测试）"
        swift test --configuration release
      continue-on-error: true
      
    - name: Run unit tests without API integration
      if: vars.DANDANPLAY_APP_ID == '' || vars.DANDANPLAY_APP_SECRET == ''
      run: |
        echo "🧪 运行基础测试套件（跳过 API 集成测试）"
        swift test --configuration release --filter ".*(?<!API)Test.*"
      continue-on-error: true
      
    - name: Cleanup API Configuration
      if: always() && vars.DANDANPLAY_APP_ID != '' && vars.DANDANPLAY_APP_SECRET != ''
      run: |
        # 恢复原始的占位符配置
        cat > Sources/Utilities/DanDanPlayConfig.swift << 'EOF'
        import Foundation
        
        /// DanDanPlay API配置管理
        /// 
        /// 安全提醒：
        /// 1. AppSecret不应在客户端应用中硬编码
        /// 2. 发布时应对代码进行混淆以防止AppSecret泄露
        /// 3. 使用签名验证模式而非凭证模式
        /// 
        /// 申请地址：https://doc.dandanplay.com/open/#_3-%E7%94%B3%E8%AF%B7-appid-%E5%92%8C-appsecret
        struct DanDanPlayConfig {
            /// API AppId - 需要从DanDanPlay开发者后台获取
            /// 申请邮箱：kaedei@dandanplay.net
            /// 邮件标题：弹弹play开放平台申请
            static let appId: String = "YOUR_APP_ID" // TODO: 替换为实际的AppId
            
            /// API AppSecret - 需要从DanDanPlay开发者后台获取
            /// ⚠️ 安全警告：请不要在生产环境中硬编码AppSecret
            /// ⚠️ 发布前请确保代码混淆以防止密钥泄露
            private static let appSecret: String = "YOUR_APP_SECRET" // TODO: 替换为实际的AppSecret
            
            /// 获取AppSecret（内部使用）
            /// 使用私有方法避免直接暴露AppSecret
            static var secretKey: String {
                return appSecret
            }
            
            /// 检查是否已配置API密钥
            static var isConfigured: Bool {
                return appId != "YOUR_APP_ID" && 
                       appSecret != "YOUR_APP_SECRET" && 
                       !appId.isEmpty && 
                       !appSecret.isEmpty
            }
            
            /// 验证配置有效性
            /// - Returns: 配置状态和错误信息
            static func validateConfiguration() -> (isValid: Bool, errorMessage: String?) {
                if appId.isEmpty || appId == "YOUR_APP_ID" {
                    return (false, "AppId未配置，请联系开发者获取")
                }
                
                if appSecret.isEmpty || appSecret == "YOUR_APP_SECRET" {
                    return (false, "AppSecret未配置，请联系开发者")
                }
                
                return (true, nil)
            }
        }
        EOF
        echo "✅ API 配置已恢复为占位符"