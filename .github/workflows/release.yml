name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
    - name: Extract version from tag
      id: version
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        echo "VERSION_NUMBER=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          .build
          ~/Library/Caches/org.swift.swiftpm/
        key: ${{ runner.os }}-release-${{ hashFiles('Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-release-
    
    - name: Build release version
      run: |
        swift build --configuration release
        
    - name: Run tests
      run: |
        swift test --configuration release
        
    - name: Generate release notes
      id: release_notes
      run: |
        echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
        echo "## 🎉 DanmuPlayer tvOS ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🚀 新功能" >> $GITHUB_OUTPUT
        echo "- 详见提交历史" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🐛 修复" >> $GITHUB_OUTPUT
        echo "- 详见提交历史" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📋 技术信息" >> $GITHUB_OUTPUT
        echo "- 支持 tvOS 18.0+" >> $GITHUB_OUTPUT
        echo "- Swift 6.1+ 兼容" >> $GITHUB_OUTPUT
        echo "- 弹弹Play API 集成" >> $GITHUB_OUTPUT
        echo "- WebDAV 媒体库支持" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🔧 安装说明" >> $GITHUB_OUTPUT
        echo "1. 下载源代码" >> $GITHUB_OUTPUT
        echo "2. 在 \`DanDanPlayConfig.swift\` 中配置 API 密钥" >> $GITHUB_OUTPUT
        echo "3. 使用 Xcode 构建并部署到 Apple TV" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### ⚠️ 注意事项" >> $GITHUB_OUTPUT
        echo "- 需要申请弹弹Play API密钥" >> $GITHUB_OUTPUT
        echo "- 申请邮箱：kaedei@dandanplay.net" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create archive
      run: |
        # 创建源代码包
        git archive --format=zip --output=DanmuPlayer-tvOS-${{ steps.version.outputs.VERSION }}.zip HEAD
        
        # 创建不包含敏感信息的分发包
        mkdir -p dist
        rsync -av --exclude='.git' --exclude='.build' --exclude='*.zip' . dist/
        cd dist && zip -r ../DanmuPlayer-tvOS-${{ steps.version.outputs.VERSION }}-dist.zip .
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: DanmuPlayer tvOS ${{ steps.version.outputs.VERSION }}
        body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
        draft: false
        prerelease: false
        
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./DanmuPlayer-tvOS-${{ steps.version.outputs.VERSION }}-dist.zip
        asset_name: DanmuPlayer-tvOS-${{ steps.version.outputs.VERSION }}-dist.zip
        asset_content_type: application/zip
