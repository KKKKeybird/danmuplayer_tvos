# SwiftLint 配置文件
# 适用于 tvOS 项目的代码规范

# 包含的路径
included:
  - Sources

# 排除的路径
excluded:
  - .build
  - .git
  - *.generated.swift

# 禁用的规则
disabled_rules:
  - trailing_whitespace # 允许尾随空白（在某些格式化场景中）
  - todo # 允许 TODO 注释
  - line_length # 使用自定义行长度限制

# 启用的可选规则
opt_in_rules:
  - array_init
  - closure_spacing
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - switch_case_alignment
  - vertical_parameter_alignment

# 自定义规则配置
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 350
  error: 400  # 允许更长的类型，适应API类

file_length:
  warning: 400
  error: 500

identifier_name:
  min_length:
    warning: 1  # 允许单字符变量名（如API字段p, m）
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - tv
    - ui
    - os
    - p   # DanDanPlay API字段
    - m   # DanDanPlay API字段

# 强制转换规则
force_cast: warning
force_try: warning
force_unwrapping: warning

# 命名规则
type_name:
  min_length: 3
  max_length: 40

# 嵌套深度
nesting:
  type_level:
    warning: 2
    error: 3
  statement_level:
    warning: 5
    error: 10

# 自定义规则
custom_rules:
  # 禁止硬编码 API 密钥
  no_hardcoded_secrets:
    name: "禁止硬编码API密钥"
    regex: '(appId|appSecret)\s*=\s*"[A-Za-z0-9]{8,}"'
    message: "不要硬编码真实的API密钥，使用占位符代替"
    severity: error
  
  # 要求 TODO 包含描述
  todo_with_description:
    name: "TODO 需要包含描述"
    regex: 'TODO(?!:)'
    message: "TODO 注释应该包含详细描述，格式：TODO: 描述"
    severity: warning
